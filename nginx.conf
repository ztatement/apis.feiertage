# Nginx Konfiguration fĂĽr Feiertags-API
# Diese Regeln sollten innerhalb des 'server'-Blocks platziert werden.

# Falls die API in einem Unterverzeichnis liegt (z.B. /apis/feiertage/), 
# mĂĽssen die Pfade entsprechend angepasst werden.

# 1. LĂ¤nder abrufen: /api/countries
rewrite ^/api/countries/?$ /feiertag.api.php?action=countries last;

# 2. Regionen eines Landes abrufen: /api/DE/regions
rewrite ^/api/([a-zA-Z]{2})/regions/?$ /feiertag.api.php?action=regions&country=$1 last;

# 3. ICS Export mit Region: /api/2026/DE/BY/ics
rewrite ^/api/([0-9]{4})/([a-zA-Z]{2})/([a-zA-Z]{2,3})/ics/?$ /ics.php?year=$1&country=$2&region=$3 last;

# 4. ICS Export ohne Region: /api/2026/DE/ics
rewrite ^/api/([0-9]{4})/([a-zA-Z]{2})/ics/?$ /ics.php?year=$1&country=$2 last;

# 5. Feiertage mit Region: /api/2026/DE/BY
rewrite ^/api/([0-9]{4})/([a-zA-Z]{2})/([a-zA-Z]{2,3})/?$ /feiertag.api.php?year=$1&country=$2&region=$3 last;

# 6. Feiertage ohne Region: /api/2026/DE
rewrite ^/api/([0-9]{4})/([a-zA-Z]{2})/?$ /feiertag.api.php?year=$1&country=$2 last;